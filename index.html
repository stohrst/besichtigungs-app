    // ── INDEXEDDB ─────────────────────────────────────────────────────────
    // Ersetzt localStorage (5 MB) durch IndexedDB (500+ MB)
    const _DB = (function () {
      var DB_NAME = 'BesichtigungsDB';
      var DB_VER  = 1;
      var STORE   = 'gutachten';
      var _dbPromise = null;

      function openDB() {
        if (_dbPromise) return _dbPromise;
        _dbPromise = new Promise(function (resolve, reject) {
          var req = indexedDB.open(DB_NAME, DB_VER);
          req.onerror = function () { reject(req.error); };
          req.onsuccess = function () { resolve(req.result); };
          req.onupgradeneeded = function (e) {
            var db = e.target.result;
            if (!db.objectStoreNames.contains(STORE)) {
              db.createObjectStore(STORE, { keyPath: 'k' });
            }
          };
        });
        return _dbPromise;
      }

      function get(key) {
        return openDB().then(function (db) {
          return new Promise(function (resolve, reject) {
            var tx  = db.transaction(STORE, 'readonly');
            var req = tx.objectStore(STORE).get(key);
            req.onsuccess = function () {
              var r = req.result;
              resolve(r ? { key: r.k, value: r.v } : null);
            };
            req.onerror = function () { reject(req.error); };
          });
        });
      }

      function set(key, value) {
        return openDB().then(function (db) {
          return new Promise(function (resolve, reject) {
            var tx  = db.transaction(STORE, 'readwrite');
            var req = tx.objectStore(STORE).put({ k: key, v: value });
            req.onsuccess = function () { resolve({ key: key, value: value }); };
            req.onerror = function () { reject(req.error); };
          });
        });
      }

      // Migration localStorage → IndexedDB (einmalig)
      var _ready = get('_migrated_v1').then(function (already) {
        if (already) return;
        var lsVal = null;
        try { lsVal = localStorage.getItem(STORAGE_KEY); } catch(e) {}
        if (!lsVal) return;
        return set(STORAGE_KEY, lsVal).then(function () {
          return set('_migrated_v1', 'true');
        }).then(function () {
          try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
          console.log('[DB] Migration localStorage → IndexedDB OK');
        });
      }).catch(function (e) {
        console.warn('[DB] Migration Fehler:', e);
      });

      return { get: get, set: set, ready: _ready };
    })();

    if (!window.storage) {
      window.storage = { get: _DB.get, set: _DB.set };

          var pct = Math.round((est.usage / est.quota) * 100);
          var usedMB = (est.usage / 1024 / 1024).toFixed(1);
          var quotaMB = (est.quota / 1024 / 1024).toFixed(0);
          cb({ percent: pct, mb: usedMB, quotaMB: quotaMB });
        }).catch(function () { cb(null); });
      } else {
        cb(null);

    function buildSections(overrideOrder) {
      const reiterFelder = {};
      Object.values(FIELDS).forEach(f => {
        if (!reiterFelder[f.kat]) reiterFelder[f.kat] = [];
        reiterFelder[f.kat].push(f);
      });
      Object.keys(reiterFelder).forEach(kat => {
        reiterFelder[kat].sort((a, b) => (a.sort||0) - (b.sort||0));
      });
      const _order = overrideOrder || REITER_ORDER_LIST;
      return _order.map(reiterName => {
        const cfg = REITER_CONFIG[reiterName] || { id: reiterName.toLowerCase().replace(/ /g,'_'), icon: Building2, color: '#124d5c' };
        const felder = reiterFelder[reiterName] || [];
        const gruppenMap = {};
        const gruppenOrder = [];
        felder.forEach(f => {
          const g = f.gruppe || '';
          if (!gruppenMap[g]) { gruppenMap[g] = []; gruppenOrder.push(g); }
          gruppenMap[g].push(f.id);
        });
        const groups = gruppenOrder.map(g => ({
          label: g,
          fieldIds: gruppenMap[g],
          showHeader: gruppenMap[g].length > 3 || FORCE_SHOW_HEADERS.includes(g)
        }));
        return { id: cfg.id, label: reiterName, icon: cfg.icon, color: cfg.color, groups };

    function isFieldConditionallyVisible(fid, vals) {
      const cond = CONDITIONAL_FIELDS[fid];
      if (!cond) return true;
      if (cond.includes('~')) {
        const [triggers, sv] = cond.split('~');
        return triggers.split(',').some(t => {
          const v = vals[t];
          return Array.isArray(v) ? v.includes(sv) : v === sv;
        });
      }
      if (cond.includes('!=')) {
        const [trigger, nv] = cond.split('!=');
        const v = vals[trigger] || '';
        return v !== '' && v !== nv;
      }
      const [trigger, tv] = cond.split('=');
      return vals[trigger] === tv;
    }
    function getGroupFields(group) {
      if (group.fieldIds) return group.fieldIds;
      if (group.cats) {
        let fields = Object.keys(FIELDS).filter(fid => group.cats.includes(FIELDS[fid].kat));
        if (group.excludeFields) fields = fields.filter(fid => !group.excludeFields.includes(fid));
        if (group.includeFields) fields = [...fields, ...group.includeFields];
        return fields;
      }
      return [];
    }

    // FORTSCHRITTSBALKEN (Kreis)
    function ProgressCircle({ percent, size = 40, strokeWidth = 4, color = "#16a34a" }) {
      const radius = (size - strokeWidth) / 2;
      const circumference = radius * 2 * Math.PI;
      const offset = circumference - (percent / 100) * circumference;

      return (
        <svg width={size} height={size} className="transform -rotate-90">
          <circle
            cx={size / 2}
            cy={size / 2}
            r={radius}
            stroke="rgba(255,255,255,0.2)"
            strokeWidth={strokeWidth}
            fill="none"
          />
          <circle
            cx={size / 2}
            cy={size / 2}
            r={radius}
            stroke={color}
            strokeWidth={strokeWidth}
            fill="none"
            strokeDasharray={circumference}
            strokeDashoffset={offset}
            strokeLinecap="round"
          />
        </svg>
      );
    }

    // AUDIO RECORDER
    function AudioRecorder({ darkMode, onSave }) {
      const [recording, setRecording] = useState(false);
      const [audioURL, setAudioURL] = useState(null);
      const mediaRecorderRef = useRef(null);
      const chunksRef = useRef([]);

      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mediaRecorder = new MediaRecorder(stream);
          mediaRecorderRef.current = mediaRecorder;
          chunksRef.current = [];

          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
              chunksRef.current.push(e.data);
            }
          };

          mediaRecorder.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            setAudioURL(url);
            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          setRecording(true);
        } catch (err) {
          alert('Mikrofon-Zugriff verweigert');
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && recording) {
          mediaRecorderRef.current.stop();
          setRecording(false);
        }
      };

      const handleSave = () => {
        if (audioURL) {
          onSave(audioURL);
          setAudioURL(null);
        }
      };

      const borderTeal = darkMode ? "#3a7d8a" : BRAND.teal;
      const bgColor = darkMode ? "#2a2a2a" : "#fff";
      const textColor = darkMode ? "#e0e0e0" : BRAND.tealDark;

      return (
        <div className="border-[3px] rounded-xl p-4" style={{ borderColor: borderTeal, backgroundColor: darkMode ? "#1a1a1a" : bgColor }}>
          <div className="flex items-center gap-3 mb-3">
            <Mic size={24} strokeWidth={2.5} style={{ color: borderTeal }} />
            <span className="font-bold text-lg" style={{ color: textColor }}>Audio-Notiz</span>
          </div>
          
          <div className="flex gap-2 mb-3">
            {!recording && !audioURL && (
              <button onClick={startRecording} className="flex-1 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2" style={{ backgroundColor: borderTeal, color: "#fff" }}>
                <Mic size={20} strokeWidth={2.5} />
                Aufnahme starten
              </button>
            )}
            
            {recording && (
              <button onClick={stopRecording} className="flex-1 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2" style={{ backgroundColor: "#dc2626", color: "#fff" }}>
                <Square size={20} strokeWidth={2.5} />
                Stopp
              </button>
            )}
          </div>

          {audioURL && (
            <div className="space-y-3">
              <audio controls src={audioURL} className="w-full" />
              <div className="flex gap-2">
                <button onClick={() => setAudioURL(null)} className="flex-1 px-4 py-2 rounded-xl font-bold" style={{ backgroundColor: darkMode ? "#404040" : "#e8f0f2", color: textColor }}>
                  Verwerfen
                </button>
                <button onClick={handleSave} className="flex-1 px-4 py-2 rounded-xl font-bold" style={{ backgroundColor: borderTeal, color: "#fff" }}>
                  Speichern
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // FOTO LIGHTBOX
    function FotoLightbox({ foto, fotoId, allFotoIds, fotos, onClose, onNext, onPrev, darkMode }) {
      const bgColor = darkMode ? "#1a1a1a" : "#fff";
      const textColor = darkMode ? "#e0e0e0" : BRAND.tealDark;

      useEffect(() => {
        const handleEscape = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowLeft') onPrev();
          if (e.key === 'ArrowRight') onNext();
        };
        window.addEventListener('keydown', handleEscape);
        return () => window.removeEventListener('keydown', handleEscape);
      }, [onClose, onNext, onPrev]);

      return (
        <div className="fixed inset-0 bg-black/95 z-50 flex flex-col" onClick={onClose}>
          <div className="absolute top-4 right-4 z-10 flex gap-2">
            <button onClick={onClose} className="w-12 h-12 rounded-full flex items-center justify-center" style={{ backgroundColor: "rgba(255,255,255,0.2)" }}>
              <X size={24} strokeWidth={2.5} color="#fff" />
            </button>
          </div>

          <div className="flex-1 flex items-center justify-center p-4" onClick={(e) => e.stopPropagation()}>
            <button onClick={(e) => { e.stopPropagation(); onPrev(); }} className="absolute left-4 w-12 h-12 rounded-full flex items-center justify-center" style={{ backgroundColor: "rgba(255,255,255,0.2)" }}>
              <ChevronLeft size={24} strokeWidth={2.5} color="#fff" />
            </button>
            
            <img src={foto.data} alt={fotoId} className="max-w-full max-h-full object-contain" />
            
            <button onClick={(e) => { e.stopPropagation(); onNext(); }} className="absolute right-4 w-12 h-12 rounded-full flex items-center justify-center" style={{ backgroundColor: "rgba(255,255,255,0.2)" }}>
              <ChevronRight size={24} strokeWidth={2.5} color="#fff" />

    // ── EINHEIT FIELD INPUT ──────────────────────────────────────────────────
    function EinheitFieldInput({ fkey, darkMode, value, onChange }) {
      const def = EINHEIT_FELDER[fkey];
      if (!def) return null;
      const v = value !== undefined ? value : (def.type === 'Mehrfachauswahl' ? [] : '');
      const filled = Array.isArray(v) ? v.length > 0 : v && v.toString().trim();
      const bg  = darkMode ? '#2a2a2a' : '#fff';
      const fg  = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const bdr = filled ? (darkMode ? '#3a7d8a' : BRAND.teal) : (darkMode ? '#404040' : '#d4d0c4');
      const base = 'w-full border-[3px] rounded-xl px-4 py-3.5 text-base font-medium focus:outline-none';
      const sty  = { backgroundColor: bg, borderColor: bdr, color: fg };

      if (def.type === 'Dropdown' || def.type === 'Textbaustein') {
        return (<>
          <select className={base} style={sty} value={v} onChange={e => onChange(fkey, e.target.value)}>
            <option value="">— bitte wählen —</option>
            {(def.options || []).map(o => <option key={o} value={o}>{o}</option>)}
            <option value="Sonstiges">Sonstiges</option>
          </select>
          {v === 'Sonstiges' && (
            <input type="text" className={base + ' mt-2'} style={sty}
              placeholder="Sonstiges beschreiben..."
              value={data?.['_sonst_' + fkey] || ''}
              onChange={e => onChange('_sonst_' + fkey, e.target.value)} />
          )}
        </>
        );
      }
      if (def.type === 'Mehrfachauswahl') {
        const arr = Array.isArray(v) ? v : (v ? v.split(', ') : []);
        return (
          <div className="flex flex-wrap gap-2">
            {(def.options || []).map(o => {
              const ch = arr.includes(o);
              return (
                <button key={o} type="button"
                  onClick={() => onChange(fkey, ch ? arr.filter(x => x !== o) : [...arr, o])}
                  className="px-3 py-2 rounded-xl text-sm font-bold border-[3px] min-h-[44px]"
                  style={ch
                    ? { backgroundColor: darkMode ? '#3a7d8a' : BRAND.teal, borderColor: darkMode ? '#3a7d8a' : BRAND.teal, color: '#fff' }
                    : { backgroundColor: bg, borderColor: darkMode ? '#404040' : '#d4d0c4', color: fg }
                  }
                >
                  {ch && <Check size={13} strokeWidth={3} className="inline mr-1 -mt-0.5" />}{o}
                </button>
              );
            })}
          </div>
        );
      }
      if (def.type === 'Zahl_m2' || def.type === 'Zahl') {
        return (
          <div className="relative">
            <input type="number" className={base + ' pr-12'} style={sty} value={v} onChange={e => onChange(fkey, e.target.value)} />
            {def.type === 'Zahl_m2' && <span className="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-sm" style={{ color: darkMode ? '#9ca3af' : BRAND.tealMid }}>m²</span>}
          </div>
        );
      }
      if (def.type === 'Datum')
        return <input type="date" className={base} style={sty} value={v} onChange={e => onChange(fkey, e.target.value)} />;
      if (def.type === 'Zahl_Euro')
        return (
          <div className="relative">
            <input type="number" className={base + ' pr-12'} style={sty} value={v} onChange={e => onChange(fkey, e.target.value)} />
            <span className="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-sm" style={{ color: darkMode ? '#9ca3af' : BRAND.tealMid }}>€</span>
          </div>
        );
      if (def.type === 'Freitext_lang')
        return <textarea className={base + ' resize-none'} style={sty} value={v} onChange={e => onChange(fkey, e.target.value)} rows={3} />;
      return <input type="text" className={base} style={sty} value={v} onChange={e => onChange(fkey, e.target.value)} />;
    }

    // ── MODUS-WAHL MODAL ─────────────────────────────────────────────────────
    // ── PROJEKT-VERWALTUNG ──────────────────────────────────────────────────
    function ProjectListScreen({ projects, darkMode, onOpen, onNew, onDelete, onDuplicate, onToggleDark, onStatusChange }) {
      const bg1 = darkMode ? '#1a1a1a' : BRAND.cream;
      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;
      const brd = darkMode ? '#404040' : '#d4d0c4';

      const [searchTerm, setSearchTerm] = useState('');
      const [filterStatus, setFilterStatus] = useState('Alle');
      const [sortBy, setSortBy] = useState('updatedAt');

      const STATUS_LIST = ['Entwurf', 'In Bearbeitung', 'Besichtigung abgeschlossen', 'Fertiggestellt'];
      const STATUS_COL = { 'Entwurf': '#6b7280', 'In Bearbeitung': BRAND.orange, 'Besichtigung abgeschlossen': '#2563eb', 'Fertiggestellt': BRAND.success };

      const timeAgo = (ds) => {
        if (!ds) return null;
        const ms = Date.now() - new Date(ds).getTime();
        const m = Math.floor(ms/60000), h = Math.floor(ms/3600000), d = Math.floor(ms/86400000);
        if (m < 1) return 'gerade eben';
        if (m < 60) return 'vor ' + m + ' Min.';
        if (h < 24) return 'vor ' + h + ' Std.';
        if (d === 1) return 'gestern';
        if (d < 7) return 'vor ' + d + ' Tagen';
        return new Date(ds).toLocaleDateString('de-DE');
      };

      let list = [...projects];
      if (searchTerm.trim()) {
        const q = searchTerm.toLowerCase();
        list = list.filter(p => [p.address, p.ort, p.plz, p.objectType, p.auftraggeber].filter(Boolean).join(' ').toLowerCase().includes(q));
      }
      if (filterStatus !== 'Alle') list = list.filter(p => (p.status || 'Entwurf') === filterStatus);
      list.sort((a, b) => {
        if (sortBy === 'address') return (a.address || '').localeCompare(b.address || '');
        if (sortBy === 'progress') return (b.progress || 0) - (a.progress || 0);
        if (sortBy === 'status') return (a.status || '').localeCompare(b.status || '');
        return (b.updatedAt || '').localeCompare(a.updatedAt || '');
      });

      const Ring = ({ pct, sz = 44 }) => {
        const r = (sz - 5) / 2, c = 2 * Math.PI * r;
        const col = pct >= 100 ? BRAND.success : pct > 50 ? BRAND.orange : bT;
        return (
          <svg width={sz} height={sz} className="flex-shrink-0">
            <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={darkMode ? '#333' : '#eee'} strokeWidth="3.5" />
            <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="3.5"
              strokeDasharray={c} strokeDashoffset={c - c * Math.min(pct, 100) / 100}
              strokeLinecap="round" transform={'rotate(-90 ' + sz/2 + ' ' + sz/2 + ')'}
              style={{ transition: 'stroke-dashoffset 0.4s' }} />
            <text x={sz/2} y={sz/2} textAnchor="middle" dominantBaseline="central"
              fill={col} fontSize="11" fontWeight="700">{pct}%</text>
          </svg>
        );
      };

      return (
        <div className="min-h-screen" style={{ backgroundColor: bg1, fontFamily: 'system-ui, sans-serif' }}>
          <div className="max-w-3xl mx-auto px-5 py-6">

            {/* ── HEADER ── */}
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-xl flex items-center justify-center" style={{ backgroundColor: BRAND.teal }}>
                  <Building2 size={22} strokeWidth={2.5} color="#fff" />
                </div>
                <div>
                  <h1 className="text-xl font-bold leading-tight" style={{ color: fgP }}>Gutachten</h1>
                  <p className="text-xs" style={{ color: fgS }}>Besichtigungs-App v8.6</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onToggleDark} className="w-10 h-10 rounded-xl flex items-center justify-center"
                  style={{ backgroundColor: darkMode ? '#333' : '#e8f0f2' }}>
                  {darkMode ? <Sun size={17} strokeWidth={2.5} color={BRAND.orange} /> : <Moon size={17} strokeWidth={2.5} style={{ color: bT }} />}
                </button>
                <button onClick={onNew}
                  className="flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm text-white active:scale-95 transition-transform"
                  style={{ backgroundColor: BRAND.orange }}>
                  <Plus size={17} strokeWidth={2.5} />
                  Neues Gutachten
                </button>
              </div>
            </div>

            {/* ── SUCHE + FILTER ── */}
            {projects.length > 0 && (
              <div className="mb-4 space-y-2.5">
                <div className="flex gap-2" style={{ height: 36 }}>
                  <div className="flex-1" style={{ position: 'relative' }}>
                    <div style={{ position: 'absolute', left: 10, top: 0, bottom: 0, display: 'flex', alignItems: 'center', pointerEvents: 'none' }}>
                      <Search size={14} strokeWidth={2.5} color={fgS} />
                    </div>
                    <input type="text" placeholder="Adresse, Ort, Auftraggeber..."
                      className="w-full text-sm focus:outline-none"
                      style={{ height: 36, backgroundColor: bg2, border: '2px solid ' + (searchTerm ? bT : brd), borderRadius: 10, paddingLeft: 32, paddingRight: 10, color: fgP }}
                      value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                  </div>
                  <select className="text-sm font-bold focus:outline-none cursor-pointer"
                    style={{ height: 36, backgroundColor: bg2, border: '2px solid ' + brd, borderRadius: 10, paddingLeft: 10, paddingRight: 10, color: fgP }}
                    value={sortBy} onChange={e => setSortBy(e.target.value)}>
                    <option value="updatedAt">Aktuellste</option>
                    <option value="address">Adresse</option>
                    <option value="progress">Fortschritt</option>
                    <option value="status">Status</option>
                  </select>
                </div>
                <div className="flex items-center gap-1.5">
                  {['Alle', ...STATUS_LIST].map(s => (
                    <button key={s} onClick={() => setFilterStatus(s)}
                      className="px-3.5 py-1.5 rounded-lg text-sm font-bold transition-colors"
                      style={filterStatus === s
                        ? { backgroundColor: s === 'Alle' ? bT : (STATUS_COL[s] || bT), color: '#fff' }
                        : { backgroundColor: darkMode ? '#2a2a2a' : '#eee', color: fgS }}>
                      {s === 'Besichtigung abgeschlossen' ? 'Abgeschlossen' : s}
                    </button>
                  ))}
                  <span className="text-xs ml-auto" style={{ color: fgS }}>{list.length}/{projects.length}</span>
                </div>
              </div>
            )}

            {/* ── LISTE ── */}
            {list.length === 0 && projects.length === 0 ? (
              <div className="text-center py-16 rounded-2xl border-[3px] border-dashed" style={{ borderColor: bT }}>
                <FolderOpen size={48} strokeWidth={1.5} color={fgS} className="mx-auto mb-3" style={{ opacity: 0.35 }} />
                <h2 className="text-lg font-bold mb-1" style={{ color: fgP }}>Keine Gutachten</h2>
                <p className="text-sm mb-5" style={{ color: fgS }}>Erstellen Sie Ihr erstes Gutachten.</p>
                <button onClick={onNew} className="px-6 py-2.5 rounded-xl font-bold text-sm text-white" style={{ backgroundColor: BRAND.orange }}>
                  <span className="flex items-center gap-2"><Plus size={17} strokeWidth={2.5} /> Neues Gutachten</span>
                </button>
              </div>
            ) : list.length === 0 ? (
              <div className="text-center py-10 rounded-2xl border-[2px] border-dashed" style={{ borderColor: brd }}>
                <Search size={32} strokeWidth={1.5} color={fgS} className="mx-auto mb-2" style={{ opacity: 0.35 }} />
                <p className="text-sm font-bold" style={{ color: fgP }}>Keine Treffer</p>
                <p className="text-xs mt-1" style={{ color: fgS }}>Filter oder Suchbegriff anpassen.</p>
              </div>
            ) : (
              <div className="space-y-2.5">
                {list.map(p => {
                  const addr = p.address || 'Ohne Adresse';
                  const ort = [p.plz, p.ort].filter(Boolean).join(' ');
                  const typ = p.objectType || '';
                  const datum = p.date ? new Date(p.date).toLocaleDateString('de-DE') : null;
                  const upd = timeAgo(p.updatedAt);
                  const modus = p.modus === 'renditeobjekt' ? 'Rendite' : null;
                  const st = p.status || 'Entwurf';
                  const stC = STATUS_COL[st] || '#6b7280';
                  const pct = p.progress || 0;

                  return (
                    <div key={p.id} className="rounded-xl border-[2px] overflow-hidden cursor-pointer active:scale-[0.998] transition-transform"
                      style={{ borderColor: darkMode ? '#444' : '#ccc', backgroundColor: bg2 }}
                      onClick={() => onOpen(p.id)}>

                      {/* Obere Zeile: Ring + Adresse + Aktionen */}
                      <div className="px-4 py-3.5 flex items-center gap-3">
                        <Ring pct={pct} sz={44} />
                        <div className="flex-1 min-w-0">
                          <div className="font-bold text-base leading-snug truncate" style={{ color: fgP }}>{addr}</div>
                          {ort && <div className="text-xs mt-0.5 truncate" style={{ color: fgS }}>{ort}</div>}
                        </div>
                        <div className="flex items-center gap-1 flex-shrink-0">

                            <Copy size={13} strokeWidth={2.5} style={{ color: fgS }} />

                          <button onClick={e => { e.stopPropagation(); onDelete(p.id); }}
                            className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: '#dc262612' }} title="Löschen">
                            <Trash2 size={13} strokeWidth={2.5} color="#dc2626" />
                          </button>
                        </div>
                      </div>

                      {/* Untere Zeile: Badges + Status-Dropdown + Zeitstempel */}
                      <div className="px-4 pb-3 flex items-center gap-2 flex-wrap">
                        <select onClick={e => e.stopPropagation()}
                          className="text-xs font-bold rounded-md px-2 py-1 border-[2px] focus:outline-none cursor-pointer"
                          style={{ backgroundColor: stC + '12', borderColor: stC + '50', color: stC, maxWidth: 160 }}
                          value={st} onChange={e => { e.stopPropagation(); onStatusChange(p.id, e.target.value); }}>
                          {STATUS_LIST.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        {typ && <span className="text-xs font-bold px-2 py-0.5 rounded-md" style={{ backgroundColor: bT + '12', color: bT }}>{typ}</span>}
                        {modus && <span className="text-xs font-bold px-2 py-0.5 rounded-md" style={{ backgroundColor: BRAND.orange + '15', color: BRAND.orange }}>{modus}</span>}
                        {datum && <span className="text-xs" style={{ color: fgS }}>{datum}</span>}
                        {upd && <span className="text-xs ml-auto" style={{ color: fgS }}>{upd}</span>}
                      </div>
                    </div>
                  );
                })}

                {/* +Karte */}
                <div className="rounded-xl border-[2px] border-dashed cursor-pointer active:scale-[0.998] transition-transform"
                  style={{ borderColor: brd }} onClick={onNew}>
                  <div className="px-4 py-4 flex items-center justify-center gap-2">
                    <Plus size={18} strokeWidth={2.5} style={{ color: BRAND.orange }} />
                    <span className="text-sm font-bold" style={{ color: fgS }}>Neues Gutachten anlegen</span>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

                  <div className="font-bold text-lg mb-0.5" style={{ color: fgP }}>Einzelobjekt</div>
                  <div className="text-sm" style={{ color: fgS }}>EFH, ETW, ZFH</div>
                </div>
              </button>
              <button onClick={() => onSelect('renditeobjekt')}

                style={{ borderColor: BRAND.orange, backgroundColor: bg1 }}>

                  <div className="text-sm" style={{ color: fgS }}>MFH, WGH, Gewerbe</div>
                </div>
              </button>
            </div>
