    // ── EINHEIT CARD ─────────────────────────────────────────────────────────
    function EinheitCard({ einheit, onEdit, onDelete, darkMode }) {
      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const bg1 = darkMode ? '#1a1a1a' : BRAND.cream;
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;
      const hdr = EINHEIT_TYP_FARBEN[einheit.typ] || BRAND.teal;
      const fc  = Object.values(einheit.fotos || {}).filter(Boolean).length;
      const ok  = EINHEIT_PROGRESS_FELDER.filter(k => einheit[k] && einheit[k].toString().trim()).length;
      const pct = Math.round((ok / EINHEIT_PROGRESS_FELDER.length) * 100);
      const sum = [einheit.geschoss, einheit.flaeche ? einheit.flaeche + '\u00a0m\u00b2' : null, einheit.nutzungsstatus].filter(Boolean).join('\u00b7');
      const miete = einheit.nettomiete_monat ? '€\u00a0' + Number(einheit.nettomiete_monat).toLocaleString('de-DE') + '\u00a0/\u00a0Mo.' : null;
      return (
        <div className="rounded-2xl border-[3px] overflow-hidden" style={{ borderColor: bT, backgroundColor: bg2 }}>
          <div className="px-5 py-4 flex items-center justify-between" style={{ backgroundColor: hdr }}>
            <div className="flex items-center gap-3 min-w-0">
              <Layers size={20} strokeWidth={2.5} color="#fff" className="flex-shrink-0" />
              <div className="min-w-0">
                <div className="font-bold text-white text-base truncate">{einheit.bezeichnung || ('Einheit \u2013 ' + (einheit.typ || 'Unbenannt'))}</div>
                {sum && <div className="text-white/75 text-sm truncate">{sum}</div>}
              </div>
            </div>
            <div className="flex items-center gap-2 ml-3 flex-shrink-0">
              <button onClick={onEdit} className="px-3 py-2 rounded-lg font-bold text-sm" style={{ backgroundColor: 'rgba(255,255,255,0.2)', color: '#fff' }}>Bearbeiten</button>
              <button onClick={onDelete} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ backgroundColor: 'rgba(220,38,38,0.85)' }}>
                <Trash2 size={15} strokeWidth={2.5} color="#fff" />
              </button>
            </div>
          </div>
          <div className="px-5 py-3 flex items-center gap-5 flex-wrap" style={{ backgroundColor: bg1 }}>
            <div className="flex items-center gap-1.5">
              <Camera size={13} style={{ color: fgS }} />
              <span className="text-sm font-medium" style={{ color: fgS }}>{fc} Foto{fc !== 1 ? 's' : ''}</span>
            </div>
            <div className="flex items-center gap-1.5">
              <Check size={13} style={{ color: pct === 100 ? BRAND.success : fgS }} />
              <span className="text-sm font-medium" style={{ color: pct === 100 ? BRAND.success : fgS }}>{pct}% Basis</span>
            </div>
            {miete && (
              <div className="flex items-center gap-1.5">
                <Euro size={13} style={{ color: fgS }} />
                <span className="text-sm font-bold" style={{ color: fgP }}>{miete}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── EINHEIT SUCH-OVERLAY ──────────────────────────────────────────────────
    function EinheitSuchOverlay({ darkMode, onClose, onSelect }) {
      const [eq, setEq] = useState('');
      const eRef = useRef(null);
      useEffect(() => { if (eRef.current) eRef.current.focus(); }, []);
      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;
      const eres = useMemo(() => {
        if (!eq || eq.length < 2) return [];
        const lq = eq.toLowerCase();
        return Object.entries(EINHEIT_FELDER)
          .filter(([, f]) => f.label.toLowerCase().includes(lq))
          .map(([k, f]) => ({ id: k, label: f.label }))
          .slice(0, 20);
      }, [eq]);
      return (
        <div className="fixed inset-0 flex flex-col" style={{ zIndex: 60, backgroundColor: 'rgba(0,0,0,0.6)' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="max-w-xl mx-auto mt-6 px-4 w-full">
            <div className="rounded-2xl overflow-hidden shadow-2xl" style={{ backgroundColor: bg2 }}>
              <div className="flex items-center gap-3 px-5 py-4 border-b-[3px]" style={{ borderColor: bT }}>
                <Search size={20} style={{ color: fgS }} />
                <input ref={eRef} type="text" value={eq} onChange={e => setEq(e.target.value)}
                  placeholder="Einheitenfeld suchen..."
                  className="flex-1 bg-transparent text-lg font-medium focus:outline-none"
                  style={{ color: fgP }}
                  onKeyDown={e => { if (e.key === 'Escape') onClose(); }}
                />
                {eq && <button onClick={() => setEq('')}><X size={18} style={{ color: fgS }} /></button>}
                <button onClick={onClose}><X size={20} style={{ color: fgS }} /></button>
              </div>
              {eres.length > 0 ? (
                <div className="max-h-72 overflow-y-auto">
                  {eres.map(r => (
                    <button key={r.id} onClick={() => onSelect(r)}
                      className="w-full px-5 py-3 flex items-center justify-between border-b text-left"
                      style={{ borderColor: darkMode ? '#333' : '#eee' }}>
                      <span className="font-medium text-sm" style={{ color: fgP }}>{r.label}</span>
                      <ChevronRight size={15} style={{ color: fgS }} />
                    </button>
                  ))}
                </div>
              ) : eq.length >= 2 ? (
                <div className="px-5 py-5 text-center text-sm" style={{ color: fgS }}>Kein Feld gefunden</div>
              ) : null}
            </div>
          </div>
        </div>
      );
    }

    // ── EINHEIT NOTIZEN-PANEL ─────────────────────────────────────────────────
    function EinheitNotizenPanel({ darkMode, bezeichnung, typ, notizen, audioNotizen, onChange, onClose }) {
      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;
      return (
        <div className="fixed inset-0 flex flex-col" style={{ zIndex: 60, backgroundColor: 'rgba(0,0,0,0.6)' }}>
          <div className="flex-1 flex flex-col" style={{ backgroundColor: bg2, marginTop: '60px', borderRadius: '24px 24px 0 0', overflow: 'hidden' }}>
            <div className="px-6 py-4 border-b-[3px] flex items-center justify-between flex-shrink-0" style={{ borderColor: bT }}>
              <span className="font-bold text-lg" style={{ color: fgP }}>Notiz – {bezeichnung || typ || 'Einheit'}</span>
              <button onClick={onClose} className="w-10 h-10 rounded-xl flex items-center justify-center"
                style={{ backgroundColor: darkMode ? '#404040' : '#e8f0f2' }}>
                <X size={20} style={{ color: bT }} />
              </button>
            </div>
            <div className="flex-1 overflow-y-auto px-6 py-5 space-y-5">
              <textarea
                className="w-full border-[3px] rounded-xl px-4 py-3 text-base resize-none focus:outline-none"
                style={{ backgroundColor: darkMode ? '#1a1a1a' : '#f8f9fa', borderColor: notizen ? bT : (darkMode ? '#404040' : '#d4d0c4'), color: fgP, minHeight: '140px' }}
                placeholder="Freitext-Notiz zur Einheit..."
                value={notizen}
                onChange={e => onChange('notizen', e.target.value)}
                rows={5}
              />
              <div>
                <div className="text-xs font-bold uppercase tracking-wide mb-3" style={{ color: fgS }}>Sprachnotiz</div>
                <AudioRecorder darkMode={darkMode} onSave={url => onChange('audioNotizen', [...audioNotizen, { url, timestamp: new Date().toISOString() }])} />
              </div>
              {audioNotizen.length > 0 && (
                <div className="space-y-2">
                  {audioNotizen.map((an, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 rounded-xl border-[2px]"
                      style={{ borderColor: darkMode ? '#404040' : '#d4d0c4', backgroundColor: bg2 }}>
                      <audio src={an.url} controls className="flex-1 h-9" />
                      <button onClick={() => onChange('audioNotizen', audioNotizen.filter((_, j) => j !== i))}
                        className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
                        style={{ backgroundColor: '#dc2626' }}>
                        <Trash2 size={13} color="#fff" />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── EINHEIT MODAL ─────────────────────────────────────────────────────────
    function EinheitModal({ einheit, darkMode: dmProp, setDarkMode, onSave, onCancel }) {
      const [tab, setTab]              = useState(0);
      const [data, setData]            = useState({ ...einheit });
      const [localFotos, setLocalFotos]= useState({ ...(einheit.fotos || {}) });
      const [showFotoM, setShowFotoM]  = useState(false);
      const [pendingFoto, setPending]  = useState(null);
      const [showNotizen, setShowNotizen] = useState(false);
      const [showESearch, setShowESearch] = useState(false);
      const uRef      = useRef(null);
      const contentRef= useRef(null);

      const darkMode = dmProp;
      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const bg1 = darkMode ? '#1a1a1a' : BRAND.cream;
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;
      const typColor = EINHEIT_TYP_FARBEN[data.typ] || bT;

      const TABS = ['Basis', 'T\u00fcr & Fenster', 'Ausstattung', 'Sanit\u00e4r', 'Miete', 'Fotos'];
      const slots = Array.from({ length: 12 }, (_, i) => 'FOTO_' + String(i + 1).padStart(2, '0'));

      useEffect(() => {
        if (contentRef.current) contentRef.current.scrollTop = 0;
      }, [tab]);

      const setField = (k, v) => setData(p => ({ ...p, [k]: v }));
      const doSave   = () => onSave({ ...data, fotos: localFotos });

      // Bedingte Feld-Sichtbarkeit
      const isFieldVisible = (fk) => {
        if ((fk === 'zimmeranzahl' || fk === 'zimmer_typ') && !['Wohnen', 'B\u00fcro'].includes(data.typ)) return false;
        if (['treppe_innen_belag','treppe_innen_gelaender','treppe_innen_handlauf','treppe_waende','treppe_besonderheit'].includes(fk) && data.treppe_innen_art === 'keine Innentreppe') return false;
        if (fk.startsWith('gaeste_wc_') && data.gaeste_wc !== 'vorhanden') return false;
        const hasParkett = (data.boden || []).includes('Parkett') || (data.boden_flure || []).includes('Parkett');
        if (['parkett_holzart','parkett_muster'].includes(fk) && !hasParkett) return false;
        return true;
      };

      // Foto-Handler
      const handleFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const next = slots.find(k => !localFotos[k]);
          if (!next) { alert('Max. 12 Fotos pro Einheit.'); return; }
          setPending({ id: next, data: e.target.result, timestamp: new Date().toISOString() });
          setShowFotoM(true);
        };
        reader.readAsDataURL(file);
        if (uRef.current) uRef.current.value = '';
      };

      const saveFoto = (foto) => {
        if (foto?.id) {
          setLocalFotos(p => ({ ...p, [foto.id]: foto }));
          // Foto in Unterordner herunterladen
          const bez = (data.bezeichnung || data.typ || 'Einheit').replace(/[^a-zA-Z0-9_]/g, '_');
          const label2 = foto.kategorie ? foto.kategorie.replace(/[^a-zA-Z0-9_]/g, '_') : foto.id;
          downloadFotoToGallery(foto.data, `Besichtigung_${new Date().toISOString().slice(0,10)}/${bez}_${label2}.jpg`);
        }
        setShowFotoM(false); setPending(null);
      };

      // Einheit-Suche: Index aus TAB_SEKTIONEN bauen
      const searchResults = useMemo(() => {
        const q = '';
        return [];
      }, []);

      const handleESearch = (field) => {
        // Finde Tab und springe dorthin
        for (let ti = 0; ti < EINHEIT_TAB_SEKTIONEN.length; ti++) {
          for (const sekt of EINHEIT_TAB_SEKTIONEN[ti]) {
            if (sekt.felder.includes(field.id)) {
              setTab(ti);
              setShowESearch(false);
              setTimeout(() => {
                const el = document.getElementById('efeld-' + field.id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }, 300);
              return;
            }
          }
        }
        setShowESearch(false);
      };

      // Render Sektion mit Header
      const renderSektion = (sekt) => {
        const visFields = sekt.felder.filter(isFieldVisible);
        if (visFields.length === 0) return null;
        return (
          <div key={sekt.label} className="mb-5 rounded-2xl overflow-hidden border-[3px]"
            style={{ borderColor: bT, backgroundColor: bg2 }}>
            <div className="px-5 py-3.5" style={{ backgroundColor: typColor }}>
              <span className="font-bold text-base text-white">{sekt.label}</span>
            </div>
            <div className="px-5 py-5 space-y-5" style={{ backgroundColor: bg1 }}>
              {(() => {
                const els = []; let i = 0;
                while (i < visFields.length) {
                  const fk = visFields[i]; const def = EINHEIT_FELDER[fk];
                  if (!def) { i++; continue; }
                  const fk2 = visFields[i+1]; const def2 = fk2 ? EINHEIT_FELDER[fk2] : null;
                  if (def.breite === 'Klein' && def2 && def2.breite === 'Klein') {
                    els.push(
                      <div key={fk} className="grid grid-cols-2 gap-4">
                        <div id={'efeld-' + fk}>
                          <label className="block text-xs font-bold mb-2 uppercase tracking-wide" style={{ color: fgS }}>{def.label}</label>
                          <EinheitFieldInput fkey={fk} darkMode={darkMode} value={data[fk]} onChange={setField} />
                        </div>
                        <div id={'efeld-' + fk2}>
                          <label className="block text-xs font-bold mb-2 uppercase tracking-wide" style={{ color: fgS }}>{def2.label}</label>
                          <EinheitFieldInput fkey={fk2} darkMode={darkMode} value={data[fk2]} onChange={setField} />
                        </div>
                      </div>
                    ); i += 2;
                  } else {
                    els.push(
                      <div key={fk} id={'efeld-' + fk}>
                        <label className="block text-xs font-bold mb-2 uppercase tracking-wide" style={{ color: fgS }}>{def.label}</label>
                        <EinheitFieldInput fkey={fk} darkMode={darkMode} value={data[fk]} onChange={setField} />
                      </div>
                    ); i++;
                  }
                }
                return els;
              })()}
            </div>
          </div>
        );
      };

      // Einheit-SearchOverlay (sucht EINHEIT_FELDER)

      // Notizen-Panel

      return (
        <div className="fixed inset-0 z-50 flex flex-col" style={{ backgroundColor: bg1 }}>
          {/* ── Header ── */}
          <div className="px-4 py-3 border-b-[3px] flex items-center gap-2 flex-shrink-0"
            style={{ backgroundColor: bg2, borderColor: bT }}>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-bold uppercase tracking-wider" style={{ color: fgS }}>{data.typ || 'Einheit'}</div>
              <div className="font-bold text-lg truncate" style={{ color: fgP }}>{data.bezeichnung || 'Neue Einheit'}</div>
            </div>
            {/* Suche */}
            <button onClick={() => setShowESearch(true)} className="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ backgroundColor: darkMode ? '#404040' : '#e8f0f2' }}>
              <Search size={19} strokeWidth={2.5} style={{ color: bT }} />
            </button>
            {/* Hell/Dunkel */}
            <button onClick={() => setDarkMode(d => !d)} className="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ backgroundColor: darkMode ? '#404040' : '#e8f0f2' }}>
              {darkMode ? <Sun size={19} strokeWidth={2.5} style={{ color: bT }} /> : <Moon size={19} strokeWidth={2.5} style={{ color: bT }} />}
            </button>
            {/* Manuell speichern */}
            <button onClick={doSave} className="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ backgroundColor: bT }}>
              <Save size={19} strokeWidth={2.5} color="#fff" />
            </button>
            {/* Schließen */}
            <button onClick={onCancel} className="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ backgroundColor: darkMode ? '#404040' : '#e8f0f2' }}>
              <X size={20} strokeWidth={2.5} style={{ color: fgP }} />
            </button>
          </div>

          {/* ── Tabs ── */}
          <div className="flex border-b-[3px] flex-shrink-0"
            style={{ backgroundColor: bg2, borderColor: bT }}>
            {TABS.map((t, i) => (
              <button key={i} onClick={() => setTab(i)}
                className="flex-1 py-3.5 font-bold text-sm text-center whitespace-nowrap transition-colors"
                style={{ backgroundColor: tab === i ? typColor : 'transparent', color: tab === i ? '#fff' : fgS }}>
                {t}
              </button>
            ))}
          </div>

          {/* ── Content ── */}
          <div ref={contentRef} className="flex-1 overflow-y-auto px-4 py-5">
            <div className="max-w-2xl mx-auto">
              {tab < 5 ? (
                (EINHEIT_TAB_SEKTIONEN[tab] || []).map(sekt => renderSektion(sekt))
              ) : (
                // Fotos-Tab
                <div>
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="font-bold text-lg" style={{ color: fgP }}>
                      Fotos ({Object.values(localFotos).filter(Boolean).length}/12)
                    </h3>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    {slots.map(slot => {
                      const foto = localFotos[slot];
                      return (
                        <div key={slot} className="rounded-xl overflow-hidden border-[3px]"
                          style={{ borderColor: foto ? bT : (darkMode ? '#404040' : '#d4d0c4'), backgroundColor: bg2 }}>
                          {foto ? (
                            <div className="relative">
                              <img src={foto.data} alt={slot} className="w-full h-24 object-cover" />
                              <button onClick={() => setLocalFotos(p => { const n = { ...p }; delete n[slot]; return n; })}
                                className="absolute top-1 right-1 w-7 h-7 rounded-full flex items-center justify-center"
                                style={{ backgroundColor: '#dc2626' }}>
                                <Trash2 size={12} strokeWidth={2.5} color="#fff" />
                              </button>
                              {foto.kategorie && (
                                <div className="px-2 py-1 text-xs font-bold truncate" style={{ color: fgP, backgroundColor: bg2 }}>{foto.kategorie}</div>
                              )}
                            </div>
                          ) : (
                            <button onClick={() => uRef.current?.click()}
                              className="w-full h-24 flex flex-col items-center justify-center gap-1"
                              style={{ color: fgS }}>
                              <Camera size={20} strokeWidth={2} />
                              <span className="text-xs">{slot}</span>
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  <input ref={uRef} type="file" accept="image/*" capture="environment" className="hidden"
                    onChange={e => handleFile(e.target.files[0])} />
                  {showFotoM && pendingFoto && (
                    <FotoModal foto={pendingFoto} darkMode={darkMode} onSave={saveFoto}
                      onCancel={() => { setShowFotoM(false); setPending(null); }} />
                  )}
                </div>
              )}
              {/* Platz für FAB */}
              <div style={{ height: '120px' }} />
            </div>
          </div>

          {/* ── FAB Buttons (permanent, wie Hauptmenü) ── */}
          <div className="fixed bottom-6 right-6 flex flex-col gap-3" style={{ zIndex: 55 }}>
            <button onClick={() => setShowNotizen(true)}
              className="w-16 h-16 rounded-full flex items-center justify-center shadow-2xl"
              style={{ backgroundColor: darkMode ? '#3a7d8a' : BRAND.tealMid }}>
              <StickyNote size={28} strokeWidth={2.5} color="#fff" />
            </button>
            <button onClick={() => { setTab(5); setTimeout(() => uRef.current?.click(), 100); }}
              className="w-16 h-16 rounded-full flex items-center justify-center shadow-2xl"
              style={{ backgroundColor: BRAND.orange }}>
              <Camera size={28} strokeWidth={2.5} color="#fff" />
            </button>
          </div>

          {/* ── Overlays ── */}
          {showESearch && <EinheitSuchOverlay darkMode={darkMode} onClose={() => setShowESearch(false)} onSelect={handleESearch} />}
          {showNotizen && <EinheitNotizenPanel darkMode={darkMode} bezeichnung={data.bezeichnung} typ={data.typ} notizen={data.notizen || ''} audioNotizen={data.audioNotizen || []} onChange={setField} onClose={() => setShowNotizen(false)} />}
        </div>
      );
    }

    // ── EINHEITEN TAB ─────────────────────────────────────────────────────────
    function EinheitenTab({ einheiten, setEinheiten, darkMode, setDarkMode }) {
      const [showModal, setShowModal]   = useState(false);
      const [editing, setEditing]       = useState(null);

      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const bg1 = darkMode ? '#1a1a1a' : BRAND.cream;
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;

      const openNew  = () => { setEditing(emptyEinheit()); setShowModal(true); };
      const openEdit = (e) => { setEditing({ ...e }); setShowModal(true); };
      const doDelete = (id) => {
        if (!window.confirm('Einheit l\u00f6schen? Alle Daten dieser Einheit gehen verloren.')) return;
        setEinheiten(p => p.filter(e => e.id !== id));
      };
      const doSave = (saved) => {
        setEinheiten(p => {
          const i = p.findIndex(e => e.id === saved.id);
          if (i >= 0) { const n = [...p]; n[i] = saved; return n; }
          return [...p, saved];
        });
        setShowModal(false); setEditing(null);
      };

      const totalF    = einheiten.reduce((s, e) => s + (parseFloat(e.flaeche) || 0), 0);
      const totalMiete = einheiten.reduce((s, e) => s + (parseFloat(e.nettomiete_monat) || 0), 0);
      const GESCHOSS_ORDER = ['KG','UG','EG','1. OG','2. OG','3. OG','4. OG','5. OG','DG'];
      const sortedEinheiten = [...einheiten].sort((a, b) => {
        const ai = GESCHOSS_ORDER.indexOf(a.geschoss);
        const bi = GESCHOSS_ORDER.indexOf(b.geschoss);
        if (ai < 0 && bi < 0) return 0;
        if (ai < 0) return 1; if (bi < 0) return -1;
        return ai - bi;
      });

      return (
        <>
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold" style={{ color: fgP }}>
                {einheiten.length} Einheit{einheiten.length !== 1 ? 'en' : ''}
              </h2>
              {totalF > 0 && <div className="text-sm mt-0.5" style={{ color: fgS }}>Gesamtfläche: {totalF.toFixed(1)} m²{totalMiete > 0 ? ` · Nettomiete: € ${totalMiete.toLocaleString("de-DE")} / Mo.` : ""}</div>}
            </div>
            <button onClick={openNew}
              className="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-base active:scale-95 transition-transform"
              style={{ backgroundColor: BRAND.orange, color: '#fff' }}>
              <Plus size={20} strokeWidth={2.5} />
              Einheit hinzufügen
            </button>
          </div>

          {einheiten.length === 0 ? (
            <div className="rounded-2xl border-[3px] border-dashed p-12 text-center"
              style={{ borderColor: darkMode ? '#404040' : '#d4d0c4' }}>
              <Layers size={48} strokeWidth={1.5} style={{ color: fgS }} className="mx-auto mb-4" />
              <div className="text-lg font-bold mb-2" style={{ color: fgS }}>Noch keine Einheiten</div>
              <div className="text-sm mb-6" style={{ color: fgS }}>Wohn-, Gewerbe- oder Büroeinheiten hinzufügen.</div>
              <button onClick={openNew} className="px-6 py-3 rounded-xl font-bold" style={{ backgroundColor: bT, color: '#fff' }}>
                <Plus size={17} strokeWidth={2.5} className="inline mr-2 -mt-0.5" />
                Erste Einheit anlegen
              </button>
            </div>
          ) : (
            <div className="space-y-4 max-w-4xl">
              {sortedEinheiten.map(e => (
                <EinheitCard key={e.id} einheit={e} darkMode={darkMode}
                  onEdit={() => openEdit(e)} onDelete={() => doDelete(e.id)} />
              ))}
            </div>
          )}

          {showModal && editing && (
            <EinheitModal einheit={editing} darkMode={darkMode} setDarkMode={setDarkMode} onSave={doSave}
              onCancel={() => { setShowModal(false); setEditing(null); }} />
          )}
        </>
      );
    }

    // ── SEARCH OVERLAY ────────────────────────────────────────────────────────
    function SearchOverlay({ darkMode, sections, onSelect, onClose }) {
      const [q, setQ] = useState('');
      const inputRef = useRef(null);
      useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

      const bg2 = darkMode ? '#2a2a2a' : '#fff';
      const fgP = darkMode ? '#e0e0e0' : BRAND.tealDark;
      const fgS = darkMode ? '#9ca3af' : BRAND.tealMid;
      const bT  = darkMode ? '#3a7d8a' : BRAND.teal;

      const results = useMemo(() => {
        if (!q || q.length < 2) return [];
        const lq = q.toLowerCase();
        const out = [];
        Object.values(FIELDS).forEach(f => {
          if (f.label.toLowerCase().includes(lq)) {
            out.push({ id: f.id, label: f.label, kat: f.kat, gruppe: f.gruppe || '' });
          }
        });
        return out.slice(0, 20);
      }, [q]);

      return (
        <div className="fixed inset-0 z-40" style={{ backgroundColor: 'rgba(0,0,0,0.5)' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="max-w-2xl mx-auto mt-6 px-4">
            <div className="rounded-2xl overflow-hidden shadow-2xl" style={{ backgroundColor: bg2 }}>
              <div className="flex items-center gap-3 px-5 py-4 border-b-[3px]" style={{ borderColor: bT }}>
                <Search size={20} strokeWidth={2.5} style={{ color: fgS }} />
                <input ref={inputRef} type="text" value={q} onChange={e => setQ(e.target.value)}
                  placeholder="Feld suchen..."
                  className="flex-1 bg-transparent text-lg font-medium focus:outline-none"
                  style={{ color: fgP }}
                  onKeyDown={e => { if (e.key === 'Escape') onClose(); }}
                />
                {q && <button onClick={() => setQ('')} className="p-1"><X size={18} style={{ color: fgS }} /></button>}
                <button onClick={onClose} className="ml-1 p-1"><X size={20} style={{ color: fgS }} /></button>
              </div>
              {results.length > 0 && (
                <div className="max-h-80 overflow-y-auto">
                  {results.map(r => (
                    <button key={r.id} onClick={() => onSelect(r)}
                      className="w-full px-5 py-3.5 flex items-center gap-3 text-left border-b border-black/5 active:bg-black/5">
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-sm truncate" style={{ color: fgP }}>{r.label}</div>
                        <div className="text-xs truncate" style={{ color: fgS }}>{r.kat}{r.gruppe ? ' \u2192 ' + r.gruppe : ''}</div>
                      </div>
                      <ChevronRight size={16} style={{ color: fgS }} />
                    </button>
                  ))}
                </div>
              )}
              {q && q.length >= 2 && results.length === 0 && (
                <div className="px-5 py-6 text-center text-sm font-medium" style={{ color: fgS }}>Kein Feld gefunden</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // MAIN APP
    function BesichtigungsAppVollstaendig() {
      const [currentProjectId, setCurrentProjectId] = useState(null);
      const [projects, setProjects] = useState([]);
      const [appModus, setAppModus] = useState(null);
      const [einheiten, setEinheiten] = useState([]);
      const [activeSection, setActiveSection] = useState("stammdaten");
      const [values, setValues] = useState({});
      const [sonstigesValues, setSonstigesValues] = useState({});
      const [fotos, setFotos] = useState({});
      const [notizen, setNotizen] = useState("");
      const [audioNotizen, setAudioNotizen] = useState([]);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [darkMode, setDarkMode] = useState(false);
      const [autoSaveEnabled, setAutoSaveEnabled] = useState(true);
      const [lastSaved, setLastSaved] = useState(null);
      const [showNotizenModal, setShowNotizenModal] = useState(false);
      const [showFotoModal, setShowFotoModal] = useState(false);
      const [showLightbox, setShowLightbox] = useState(false);
      const [lightboxFoto, setLightboxFoto] = useState(null);
      const [currentFoto, setCurrentFoto] = useState(null);
      const [draggedFoto, setDraggedFoto] = useState(null);
      const [showSearch, setShowSearch] = useState(false);
      const [storageWarning, setStorageWarning] = useState(null);
      const fileRef = useRef(null);
      const importFileRef = useRef(null);
      const mainContentRef = useRef(null);

      // Dark Mode
      useEffect(() => {
        if (darkMode) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
      }, [darkMode]);

      // Projekt-Hilfsfunktionen
      const generateId = () => 'proj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);

      const loadProjectIndex = async () => {
        try {
          const r = await window.storage.get(PROJECT_INDEX_KEY);
          return r?.value ? JSON.parse(r.value) : [];
        } catch { return []; }
      };

      const saveProjectIndex = async (list) => {
        await window.storage.set(PROJECT_INDEX_KEY, JSON.stringify(list));
        setProjects(list);
      };

      const updateProjectMeta = (list, id, data) => {
        return list.map(p => p.id === id ? { ...p, ...data, updatedAt: new Date().toISOString() } : p);
      };

      const loadProjectData = async (id) => {
        const r = await window.storage.get('project_' + id);
        return r?.value ? JSON.parse(r.value) : null;
      };

      const openProject = async (id) => {
        const data = await loadProjectData(id);
        if (data) {
          setValues(data.values || {});
          setSonstigesValues(data.sonstigesValues || {});
          setFotos(data.fotos || {});
          setNotizen(data.notizen || '');
          setAudioNotizen(data.audioNotizen || []);
          setActiveSection(data.activeSection || 'stammdaten');
          setEinheiten(data.einheiten || []);
          setAppModus(data.appModus || 'einzelobjekt');
          setCurrentProjectId(id);
        }
      };

      const handleNewProject = () => {
        setValues({}); setSonstigesValues({}); setFotos({}); setNotizen(''); setAudioNotizen([]); setActiveSection('stammdaten'); setEinheiten([]);
        setAppModus(null);
        const id = generateId();
        setCurrentProjectId(id);
        loadProjectIndex().then(list => {
          const meta = { id, address: '', ort: '', plz: '', objectType: '', modus: null, date: '', progress: 0, status: 'Entwurf', auftraggeber: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
          saveProjectIndex([...list, meta]);
        });
      };

      const handleDeleteProject = async (id) => {
        const ok = window.confirm('Gutachten unwiderruflich löschen?\n\nAlle Daten (Felder, Fotos, Notizen) werden gelöscht!');
        if (!ok) return;
        await window.storage.set('project_' + id, '');
        const list = await loadProjectIndex();
        await saveProjectIndex(list.filter(p => p.id !== id));
        if (currentProjectId === id) {
          setCurrentProjectId(null); setAppModus(null); setValues({}); setFotos({}); setNotizen(''); setEinheiten([]);
        }
      };

      const handleDuplicateProject = async (id) => {
        const data = await loadProjectData(id);
        if (!data) return;
        const newId = generateId();
        const list = await loadProjectIndex();
        const orig = list.find(p => p.id === id);
        const meta = { ...orig, id: newId, address: (orig?.address || '') + ' (Kopie)', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        await window.storage.set('project_' + newId, JSON.stringify(data));
        await saveProjectIndex([...list, meta]);
      };

      const handleStatusChange = async (id, newStatus) => {
        const list = await loadProjectIndex();
        const updated = list.map(p => p.id === id ? { ...p, status: newStatus, updatedAt: new Date().toISOString() } : p);
        await saveProjectIndex(updated);
      };

      const handleBackToProjects = async () => {
        if (currentProjectId) {
          await window.storage.set('project_' + currentProjectId, JSON.stringify({ appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten }));
          const list = await loadProjectIndex();
          const addr = values.OBJEKT_STRASSE || '';
          const hnr = values.OBJEKT_HAUSNUMMER || '';
          const progress = sectionProgress ? Math.round(Object.values(sectionProgress).reduce((a,b) => a+b, 0) / Math.max(Object.keys(sectionProgress).length, 1)) : 0;
          await saveProjectIndex(updateProjectMeta(list, currentProjectId, {
            address: [addr, hnr].filter(Boolean).join(' '),
            auftraggeber: [values.AG_VORNAME_1, values.AG_NACHNAME_1].filter(Boolean).join(' '),
            ort: values.OBJEKT_ORT || '',
            plz: values.OBJEKT_PLZ || '',
            objectType: values.OBJEKT_TYP_KURZ || values.GEBAEUDEART_WOHNEN || '',
            modus: appModus,
            date: values.DATUM_BESICHTIGUNG || '',
            progress
          }));
        }
        setCurrentProjectId(null);
      };

      // Load – Projekt-Index + Migration alter Daten
      useEffect(() => {
        (async () => {
          try {
            await (_DB.ready || Promise.resolve());
            let list = await loadProjectIndex();
            // Migration: Alte Einzeldaten → erstes Projekt
            if (list.length === 0) {
              let r = await window.storage.get(STORAGE_KEY).catch(() => null);
              if (!r) r = await window.storage.get(STORAGE_KEY_V7).catch(() => null);
              if (r?.value) {
                const data = JSON.parse(r.value);
                if (data.values && Object.keys(data.values).length > 0) {
                  const id = generateId();
                  await window.storage.set('project_' + id, r.value);
                  const addr = [data.values.OBJEKT_STRASSE, data.values.OBJEKT_HAUSNUMMER].filter(Boolean).join(' ');
                  list = [{ id, address: addr, status: 'Entwurf', auftraggeber: '', ort: data.values.OBJEKT_ORT || '', plz: data.values.OBJEKT_PLZ || '', objectType: data.values.OBJEKT_TYP_KURZ || '', modus: data.appModus, date: data.values.DATUM_BESICHTIGUNG || '', progress: 0, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }];
                  await saveProjectIndex(list);
                }
              }
              // DarkMode aus altem Storage laden
              if (r?.value) {
                const d = JSON.parse(r.value);
                if (d.darkMode !== undefined) setDarkMode(d.darkMode);
              }
            }
            setProjects(list);
          } catch (e) { console.error('[Projects] Load error', e); }
        })();
      }, []);

      // Auto-save: sofort nach Änderung (2s debounce) + alle 60 Sekunden
      useEffect(() => {
        if (!autoSaveEnabled) return;
        const save = async () => {
          if (!currentProjectId) return;
          try {
            await window.storage.set('project_' + currentProjectId, JSON.stringify({ appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten }));
            setLastSaved(new Date());
          } catch (e) {}
        };
        const debounce = setTimeout(save, 2000);
        const interval = setInterval(save, 60000);
        return () => { clearTimeout(debounce); clearInterval(interval); };
      }, [appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten, autoSaveEnabled]);

      // Speichern beim App-Schließen
      useEffect(() => {
        const onUnload = () => {
          if (!currentProjectId) return;
          try {
            window.storage.set('project_' + currentProjectId, JSON.stringify({ appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten }));
          } catch(e) {}
        };
        window.addEventListener('beforeunload', onUnload);
        return () => window.removeEventListener('beforeunload', onUnload);
      }, [appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten]);

      // Scroll-Fix
      useEffect(() => {
        if (mainContentRef.current) {
          mainContentRef.current.scrollTop = 0;
        }
      }, [activeSection]);

      // Progress Calculation
      const sectionProgress = useMemo(() => {
        const _sects = appModus === 'renditeobjekt' ? RENDITE_SECTIONS : SECTIONS;
        const progress = {};
        _sects.forEach(section => {
          if (section.id === 'fotos') {
            const fotoIds = Array.from({ length: 24 }, (_, i) => `FOTO_${i + 1}`);
            const filled = fotoIds.filter(fid => fotos[fid]).length;
            progress[section.id] = Math.round((filled / fotoIds.length) * 100);
          } else if (section.id === 'einheiten') {
            progress[section.id] = einheiten.length > 0 ? Math.min(einheiten.length * 20, 100) : 0;
          } else {
            const fields = section.groups?.flatMap(g => getGroupFields(g)) || [];
            if (fields.length === 0) {
              progress[section.id] = 0;
              return;
            }
            const filled = fields.filter(fid => {
              const val = values[fid];
              return Array.isArray(val) ? val.length > 0 : val && val.toString().trim();
            }).length;
            progress[section.id] = Math.round((filled / fields.length) * 100);
          }
        });
        return progress;
      }, [values, fotos, appModus, einheiten]);

      const handleManualSave = useCallback(async () => {
        try {
          if (!currentProjectId) return;
          await window.storage.set('project_' + currentProjectId, JSON.stringify({ appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten }));
          setLastSaved(new Date());
          checkStorageEstimate(function(est) {
            if (est && est.percent >= 80) setStorageWarning(est);
          });
          alert('Daten gespeichert!');
        } catch (e) {
          alert('Fehler beim Speichern');
        }
      }, [appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten]);

      const handleReset = useCallback(async () => {
        await handleBackToProjects();
      }, [currentProjectId, appModus, values, sonstigesValues, fotos, notizen, audioNotizen, activeSection, darkMode, einheiten, sectionProgress]);

      const handleImport = useCallback((file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const data = JSON.parse(e.target.result);
            const ok = window.confirm('JSON importieren?\n\nAktuelle Daten werden überschrieben!');
            if (!ok) return;
            const v  = data.felder || data.values || {};
            const sv = data.sonstigesValues || {};
            const f  = data.fotos || {};
            const n  = data.notizen || "";
            setValues(v); setSonstigesValues(sv); setFotos(f); setNotizen(n); setAudioNotizen([]); setActiveSection('stammdaten'); setEinheiten([]); setAppModus('einzelobjekt');
            if (currentProjectId) {
              await window.storage.set('project_' + currentProjectId, JSON.stringify({ appModus: 'einzelobjekt', values:v, sonstigesValues:sv, fotos:f, notizen:n, audioNotizen:[], activeSection:'stammdaten', darkMode, einheiten:[] }));
            }
            setLastSaved(new Date());
            alert('Import erfolgreich! Audio-Notizen können technisch nicht importiert werden.');
          } catch(err) { alert('Fehler beim Import. Bitte gültige JSON-Datei wählen.'); }
        };
        reader.readAsText(file);
        if (importFileRef.current) importFileRef.current.value = '';
      }, [darkMode]);

      const handleChange = useCallback((fid, val) => setValues(p => ({ ...p, [fid]: val })), []);
      const handleSonstigesChange = useCallback((fid, val) => setSonstigesValues(p => ({ ...p, [fid]: val })), []);

      const handleDirectFoto = useCallback(() => {
        fileRef.current?.click();
      }, []);

      const handleFotoFile = useCallback((file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const nextId = `FOTO_${Object.keys(fotos).length + 1}`;
          const newFoto = { data: e.target.result, timestamp: new Date().toISOString() };
          setCurrentFoto({ id: nextId, ...newFoto });
          setShowFotoModal(true);
        };
        reader.readAsDataURL(file);
      }, [fotos]);

      const handleSaveFoto = useCallback((foto) => {
        if (foto?.id) {
          setFotos(p => ({ ...p, [foto.id]: foto }));
          // Foto parallel in Download-Ordner speichern (erscheint in Foto-App)
          const label = foto.label ? foto.label.replace(/[^a-zA-Z0-9_]/g, '_') : foto.id;
          downloadFotoToGallery(foto.data, `Besichtigung_${new Date().toISOString().slice(0,10)}/${label}.jpg`);
          // Speicher-Check nach Foto-Speicherung
          setTimeout(function() {
            checkStorageEstimate(function(est) {
              if (est && est.percent >= 80) setStorageWarning(est);
            });
          }, 800);
        }
        setShowFotoModal(false);
        setCurrentFoto(null);
      }, []);

      const handleOpenLightbox = useCallback((fotoId) => {
        setLightboxFoto(fotoId);
        setShowLightbox(true);
      }, []);

      const handleLightboxNav = useCallback((direction) => {
        const fotoIds = Array.from({ length: 24 }, (_, i) => `FOTO_${i + 1}`);
        const currentIndex = fotoIds.indexOf(lightboxFoto);
        let newIndex;
        if (direction === 'next') {
          newIndex = (currentIndex + 1) % fotoIds.length;
        } else {
          newIndex = (currentIndex - 1 + fotoIds.length) % fotoIds.length;
        }
        setLightboxFoto(fotoIds[newIndex]);
      }, [lightboxFoto]);

      const handleSaveAudio = useCallback((audioURL) => {
        setAudioNotizen(prev => [...prev, { url: audioURL, timestamp: new Date().toISOString() }]);
      }, []);

      const handleDeleteAudio = useCallback((index) => {
        setAudioNotizen(prev => prev.filter((_, i) => i !== index));
      }, []);

      const handleExport = useCallback(() => {
        const adresse = [values.OBJEKT_STRASSE, values.OBJEKT_HAUSNUMMER].filter(Boolean).join(" ") || "Objekt";
        let payload;
        if (appModus === 'renditeobjekt') {
          payload = {
            meta: { exportiert_am: new Date().toISOString(), app_version: "8.6", app_modus: "renditeobjekt", objekt: adresse },
            gesamtobjekt: { felder: values, sonstigesValues, fotos, notizen },
            einheiten: einheiten.map(e => ({
              id: e.id,
              basis: { typ: e.typ, bezeichnung: e.bezeichnung, geschoss: e.geschoss, ausrichtung: e.ausrichtung,
                flaeche: e.flaeche, zimmeranzahl: e.zimmeranzahl, zimmer_typ: e.zimmer_typ,
                nutzungsstatus: e.nutzungsstatus, bauzustand: e.bauzustand, barrierefreiheit: e.barrierefreiheit,
                miteigentumsanteil: e.miteigentumsanteil, abt2_recht: e.abt2_recht,
                abt2_eintragungstexte: e.abt2_eintragungstexte,
                sondereigentum_auswahl: e.sondereigentum_auswahl, sondereigentum: e.sondereigentum,
                sondernutzungsrecht_auswahl: e.sondernutzungsrecht_auswahl, sondernutzungsrecht: e.sondernutzungsrecht },
              tuer_fenster: { tuer_art: e.tuer_art, tuer_blatt: e.tuer_blatt, tuer_zargen: e.tuer_zargen,
                tuer_sicherheit: e.tuer_sicherheit, tuer_sonstiges: e.tuer_sonstiges,
                innentuere_tuerart: e.innentuere_tuerart, innentuere_tuerblatt: e.innentuere_tuerblatt,
                innentuere_zargen: e.innentuere_zargen,
                fenster_verglasung: e.fenster_verglasung, fenster_rahmen: e.fenster_rahmen,
                fenster_baujahr: e.fenster_baujahr, fenster_antrieb: e.fenster_antrieb,
                fenster_verdunkelung: e.fenster_verdunkelung, fenster_besonderheiten: e.fenster_besonderheiten },
              ausstattung: { boden: e.boden, boden_flure: e.boden_flure,
                parkett_holzart: e.parkett_holzart, parkett_muster: e.parkett_muster,
                bodensockelleisten: e.bodensockelleisten, trittschallschutz: e.trittschallschutz,
                waende: e.waende, decke: e.decke,
                kueche_art: e.kueche_art, boden_kueche: e.boden_kueche, kueche_besonderheit: e.kueche_besonderheit,
                treppe_innen_art: e.treppe_innen_art, treppe_innen_belag: e.treppe_innen_belag,
                treppe_innen_gelaender: e.treppe_innen_gelaender, treppe_innen_handlauf: e.treppe_innen_handlauf,
                treppe_waende: e.treppe_waende, treppe_besonderheit: e.treppe_besonderheit,
                sonstige_ausstattung: e.sonstige_ausstattung },
              sanitaer: { bad_wand: e.bad_wand, bad_boden: e.bad_boden, wand_sanitaer: e.wand_sanitaer,
                bad_waschbecken: e.bad_waschbecken, bad_armaturen: e.bad_armaturen,
                bad_zustand: e.bad_zustand, bad_badewanne: e.bad_badewanne, bad_dusche: e.bad_dusche,
                bad_wc: e.bad_wc, bad_wc_spuelung: e.bad_wc_spuelung, bad_belueftung: e.bad_belueftung,
                bad_besonderheiten: e.bad_besonderheiten,
                gaeste_wc: e.gaeste_wc, gaeste_wc_wand: e.gaeste_wc_wand,
                gaeste_wc_waschbecken: e.gaeste_wc_waschbecken, gaeste_wc_armaturen: e.gaeste_wc_armaturen,
                gaeste_wc_zustand: e.gaeste_wc_zustand, gaeste_wc_dusche: e.gaeste_wc_dusche,
                gaeste_wc_wc: e.gaeste_wc_wc, gaeste_wc_spuelung: e.gaeste_wc_spuelung,
                gaeste_wc_badewanne: e.gaeste_wc_badewanne, gaeste_wc_belueftung: e.gaeste_wc_belueftung,
                gaeste_wc_besonderheiten: e.gaeste_wc_besonderheiten },
              mietdaten: { mieter: e.mieter, mietbeginn: e.mietbeginn, mietende: e.mietende,
                vertragstyp: e.vertragstyp, nettomiete_monat: e.nettomiete_monat,
                nebenkosten_monat: e.nebenkosten_monat, stellplatz_miete: e.stellplatz_miete,
                mietflaeche_mfg: e.mietflaeche_mfg, indexklausel: e.indexklausel,
                wertsicherung: e.wertsicherung, sonderkuendigungsrecht: e.sonderkuendigungsrecht,
                mietdaten_sonstiges: e.mietdaten_sonstiges },
              notizen: e.notizen || '',
              audioNotizen_anzahl: (e.audioNotizen || []).length,
              fotos_anzahl: Object.values(e.fotos || {}).filter(Boolean).length,
            })),
            mietdaten: einheiten.map(e => ({ einheit_id: e.id, einheit_bezeichnung: e.bezeichnung,
              einheit_typ: e.typ, mieter: e.mieter, vertragstyp: e.vertragstyp,
              nettomiete_monat: e.nettomiete_monat, nebenkosten_monat: e.nebenkosten_monat,
              stellplatz_miete: e.stellplatz_miete, mietbeginn: e.mietbeginn, mietende: e.mietende })),
          };
        } else {
          payload = {
            meta: { exportiert_am: new Date().toISOString(), app_version: "8.6", app_modus: "einzelobjekt",
              objekt: adresse, hinweis: "Audio-Notizen koennen nicht exportiert werden" },
            felder: values, sonstigesValues, fotos, notizen,
            audioNotizen_anzahl: audioNotizen.length,
          };
        }
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const adr = [values.OBJEKT_STRASSE, values.OBJEKT_HAUSNUMMER].filter(Boolean).join("_").replace(/[^a-zA-Z0-9_]/g,'') || "Objekt";
        a.download = `Besichtigung_${adr}_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }, [appModus, values, sonstigesValues, fotos, notizen, audioNotizen, einheiten]);

      const handleDragStart = useCallback((fid) => setDraggedFoto(fid), []);
      
      const handleDrop = useCallback((targetId) => {
        if (!draggedFoto || draggedFoto === targetId) return;
        const slots = Array.from({ length: 24 }, (_, i) => `FOTO_${i + 1}`);
        const from = slots.indexOf(draggedFoto);
        const to   = slots.indexOf(targetId);
        if (from < 0 || to < 0) return;
        setFotos(p => {
          const nf = { ...p };
          const moved = p[draggedFoto];
          if (from > to) {
            for (let i = from; i > to; i--) nf[slots[i]] = p[slots[i - 1]];
          } else {
            for (let i = from; i < to; i++) nf[slots[i]] = p[slots[i + 1]];
          }
          nf[slots[to]] = moved;
          return nf;
        });
        setDraggedFoto(null);
      }, [draggedFoto]);

      const handleSearchSelect = useCallback((field) => {
        const sect = activeSections.find(s =>
          s.groups?.some(g => g.fieldIds?.includes(field.id))
        );
        if (sect) {
          setActiveSection(sect.id);
          setShowSearch(false);
          setTimeout(() => {
            const el = document.getElementById('field-' + field.id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 250);
        } else { setShowSearch(false); }
      }, [activeSections]);

      const activeSections = appModus === 'renditeobjekt' ? RENDITE_SECTIONS : SECTIONS;
      const currentSection = activeSections.find(s => s.id === activeSection);
      const Icon = currentSection?.icon || Building2;
      const fotoIds = Array.from({ length: 24 }, (_, i) => `FOTO_${i + 1}`);

      const bgPrimary = darkMode ? "#1a1a1a" : BRAND.cream;
      const bgSecondary = darkMode ? "#2a2a2a" : "#fff";
      const bgSidebar = darkMode ? "#0a2530" : BRAND.teal;
      const textPrimary = darkMode ? "#e0e0e0" : BRAND.tealDark;
      const textSecondary = darkMode ? "#9ca3af" : BRAND.tealMid;
      const borderTeal = darkMode ? "#3a7d8a" : BRAND.teal;

      if (!currentProjectId) {
        return <ProjectListScreen projects={projects} darkMode={darkMode} onOpen={openProject} onNew={handleNewProject} onDelete={handleDeleteProject} onDuplicate={handleDuplicateProject} onToggleDark={() => setDarkMode(d => !d)} onStatusChange={handleStatusChange} />;
      }

      return (
        <div className="flex h-screen" style={{ backgroundColor: bgPrimary, fontFamily: "system-ui, sans-serif" }}>
          {appModus === null && <ModusWahlModal darkMode={darkMode} onSelect={m => setAppModus(m)} />}

          {showSearch && <SearchOverlay darkMode={darkMode} sections={activeSections} onSelect={handleSearchSelect} onClose={() => setShowSearch(false)} />}

          {/* SIDEBAR mit Fortschrittsbalken */}
          <aside className={`flex-shrink-0 transition-all ${sidebarOpen ? "w-72" : "w-20"}`} style={{ backgroundColor: bgSidebar }}>
            <div className="h-full flex flex-col">
              <div className="px-4 py-5 border-b-2 border-white/20 flex items-center justify-between">
                {sidebarOpen && (
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ backgroundColor: BRAND.orange }}>
                      <Building2 size={22} strokeWidth={2.5} color="#fff" />
                    </div>
                    <div>
                      <div className="font-bold text-lg text-white">Gutachten</div>
                      <div className="text-xs text-white/70">v8.6</div>
                    </div>
                  </div>
                )}
                <button onClick={() => setSidebarOpen(o => !o)} className="w-11 h-11 rounded-xl flex items-center justify-center" style={{ backgroundColor: "rgba(255,255,255,0.1)" }}>
                  <Menu size={20} strokeWidth={2.5} color="#fff" />
                </button>
              </div>

              {sidebarOpen && (
                <>
                  <div className="px-4 py-3 border-b-2 border-white/20">
                    <button onClick={() => setDarkMode(d => !d)} className="w-full flex items-center gap-3 px-3 py-2 rounded-lg mb-2" style={{ backgroundColor: "rgba(255,255,255,0.1)" }}>
                      {darkMode ? <Sun size={18} strokeWidth={2.5} color="#fff" /> : <Moon size={18} strokeWidth={2.5} color="#fff" />}
                      <span className="flex-1 text-left text-sm font-bold text-white">{darkMode ? "Hell" : "Dunkel"}</span>
                      <div className="w-12 h-6 rounded-full flex items-center px-1" style={{ backgroundColor: darkMode ? BRAND.orange : "rgba(255,255,255,0.2)" }}>
                        <div className="w-4 h-4 rounded-full bg-white transition-all" style={{ transform: darkMode ? "translateX(24px)" : "translateX(0)" }} />
                      </div>
                    </button>
                    <button onClick={() => setAutoSaveEnabled(e => !e)} className="w-full flex items-center gap-3 px-3 py-2 rounded-lg mb-2" style={{ backgroundColor: "rgba(255,255,255,0.1)" }}>
                      <Save size={18} strokeWidth={2.5} color="#fff" />
                      <div className="flex-1 text-left">
                        <div className="text-sm font-bold text-white">Auto-Save (60s)</div>

                      </div>
                      <div className="w-12 h-6 rounded-full flex items-center px-1" style={{ backgroundColor: autoSaveEnabled ? BRAND.orange : "rgba(255,255,255,0.2)" }}>
                        <div className="w-4 h-4 rounded-full bg-white transition-all" style={{ transform: autoSaveEnabled ? "translateX(24px)" : "translateX(0)" }} />
                      </div>
                    </button>
                    <button onClick={handleReset} className="w-full flex items-center gap-3 px-3 py-2 rounded-lg" style={{ backgroundColor: "rgba(255,255,255,0.15)" }}>
                      <ArrowLeft size={18} strokeWidth={2.5} color="#fff" />
                      <div className="flex-1 text-left">
                        <div className="text-sm font-bold text-white">Projektliste</div>
                        <div className="text-xs text-white/70">Speichern und zurück</div>
                      </div>
                    </button>
                  </div>
                </>
              )}

              <nav className="flex-1 overflow-y-auto py-2">
                {activeSections.map(s => {
                  const active = activeSection === s.id;
                  const SIcon = s.icon;
                  const progress = sectionProgress[s.id] || 0;
                  const progressColor = progress === 100 ? BRAND.success : progress > 0 ? BRAND.orange : "rgba(255,255,255,0.3)";

                  return (
                    <button key={s.id} onClick={() => setActiveSection(s.id)} className={`w-full flex items-center gap-3 px-4 py-4 transition-all ${sidebarOpen ? "" : "justify-center"}`} style={active ? { backgroundColor: BRAND.orange, borderLeft: `5px solid ${bgPrimary}` } : { color: "#fff" }}>
                      {sidebarOpen ? (
                        <>
                          <SIcon size={22} strokeWidth={2.5} />
                          <span className="flex-1 text-base font-bold text-left">{s.label}</span>
                          <ProgressCircle percent={progress} size={32} strokeWidth={3} color={progressColor} />

                      ) : (
                        <div className="relative">
                          <SIcon size={22} strokeWidth={2.5} />
                          {progress > 0 && (
                            <div className="absolute -bottom-1 -right-1 w-3 h-3 rounded-full" style={{ backgroundColor: progressColor }} />
                          )}
                        </div>
                      )}
                    </button>
                  );

                  <button onClick={() => importFileRef.current && importFileRef.current.click()} className="w-full px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2" style={{ backgroundColor: "rgba(255,255,255,0.15)", color: "#fff" }}>
                    <Archive size={20} strokeWidth={2.5} />
                    JSON Import
                  </button>
                  <input ref={importFileRef} type="file" accept=".json" className="hidden" onChange={e => handleImport(e.target.files[0])} />
                </div>
              )}
            </div>
          </aside>

          {/* MAIN */}
          <div className="flex-1 flex flex-col overflow-hidden">
            <div className="border-b-[3px] px-6 py-4 flex items-center justify-between" style={{ borderColor: borderTeal, backgroundColor: bgSecondary }}>
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ backgroundColor: currentSection?.color }}>
                  <Icon size={24} strokeWidth={2.5} color="#fff" />
                </div>
                <div>
                  <div className="text-xs font-bold uppercase tracking-wider" style={{ color: textSecondary }}>
                    {[values.OBJEKT_STRASSE, values.OBJEKT_HAUSNUMMER].filter(Boolean).join(" ") || "Neue Besichtigung"}
                  </div>
                  <div className="flex items-center gap-2">
                    <h1 className="text-2xl font-bold" style={{ color: textPrimary }}>{currentSection?.label}</h1>
                    {appModus === 'renditeobjekt' && (
                      <span className="text-xs font-bold px-2 py-1 rounded-lg"
                        style={{ backgroundColor: BRAND.orange + '28', color: BRAND.orange }}>RENDITE</span>
                    )}
                  </div>
                </div>
              </div>
              
              <div className="flex items-center gap-2">
                <button onClick={() => setShowSearch(true)} className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ backgroundColor: darkMode ? "#404040" : "#e8f0f2" }}>
                  <Search size={20} strokeWidth={2.5} style={{ color: borderTeal }} />
                </button>
                <button onClick={handleManualSave} className="w-12 h-12 rounded-xl font-bold flex items-center justify-center" style={{ backgroundColor: borderTeal, color: "#fff" }}>
                  <Save size={20} strokeWidth={2.5} />
                </button>
              </div>
            </div>

            <div ref={mainContentRef} className="flex-1 overflow-y-auto px-6 py-6">
              {storageWarning && (
                <div className="mb-4 px-4 py-3 rounded-xl flex items-center justify-between gap-3" style={{ backgroundColor: "#dc2626", color: "#fff" }}>
                  <div className="flex items-center gap-2">
                    <Triangle size={18} strokeWidth={2.5} color="#fff" />
                    <span className="font-bold text-sm">Speicher {storageWarning.percent}% belegt ({storageWarning.mb} MB) – Bitte JSON exportieren.</span>
                  </div>
                  <button onClick={() => setStorageWarning(null)}>
                    <X size={18} strokeWidth={2.5} color="#fff" />
                  </button>
                </div>
              )}
              <div className="max-w-4xl mx-auto">
                {activeSection === "einheiten" ? (
                  <EinheitenTab einheiten={einheiten} setEinheiten={setEinheiten} darkMode={darkMode} setDarkMode={setDarkMode} />
                ) : activeSection === "fotos" ? (
                  <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                    {fotoIds.map(fid => (
                      <FotoCard
                        key={fid}
                        id={fid}
                        foto={fotos[fid]}
                        darkMode={darkMode}
                        onUpdate={data => setFotos(p => ({ ...p, [fid]: data }))}
                        onDelete={() => setFotos(p => { const n = { ...p }; delete n[fid]; return n; })}
                        onDragStart={() => handleDragStart(fid)}
                        onDrop={() => handleDrop(fid)}
                        onDragOver={e => e.preventDefault()}
                        onLightbox={() => handleOpenLightbox(fid)}
                      />
                    ))}
                  </div>
                ) : (
                  currentSection?.groups?.map((group, gi) => {
                    if (group.isModGroup) {
                      return (
                        <div key={gi} className="mb-5 rounded-2xl overflow-hidden border-[3px]" style={{ borderColor: borderTeal, backgroundColor: bgSecondary }}>
                          {(group.showHeader !== false && group.label) && (
                          <div className="px-5 py-4" style={{ backgroundColor: borderTeal }}>
                            <span className="font-bold text-lg text-white">{group.label}</span>
                          </div>
                          )}
                          <div className="px-5 py-5 space-y-6" style={{ backgroundColor: bgPrimary }}>
                            {MOD_FELDER_PAARE.map(([umfangId, jahrId]) => {
                              const umfang = FIELDS[umfangId];
                              const jahr = FIELDS[jahrId];
                              if (!umfang || !jahr) return null;
                              
                              const notizKey = umfangId.replace('MOD_', 'MOD_').replace('_DATUM', '') + '_NOTIZ';
                              const notizLabel = MOD_NOTIZ_FELDER[notizKey] || "Notiz";
                              
                              return (
                                <div key={umfangId} id={`field-${umfangId}`}>
                                  <div className="grid grid-cols-2 gap-4 mb-3">
                                    <div>
                                      <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>{umfang.label}</label>
                                      <FieldInput fid={umfangId} value={values[umfangId]} onChange={handleChange} darkMode={darkMode} sonstigesValue={sonstigesValues[umfangId]} onSonstigesChange={handleSonstigesChange} />
                                    </div>
                                    <div>
                                      <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>{jahr.label}</label>
                                      <FieldInput fid={jahrId} value={values[jahrId]} onChange={handleChange} darkMode={darkMode} sonstigesValue={sonstigesValues[jahrId]} onSonstigesChange={handleSonstigesChange} />
                                    </div>
                                  </div>
                                  <div>
                                    <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>{notizLabel}</label>
                                    <textarea
                                      className="w-full border-[3px] rounded-xl px-4 py-3 text-base resize-none focus:outline-none"
                                      style={{ backgroundColor: darkMode ? "#2a2a2a" : "#fff", borderColor: values[notizKey] ? borderTeal : (darkMode ? "#404040" : "#d4d0c4"), color: textPrimary }}
                                      placeholder="Optional: Umfang der Modernisierung beschreiben..."
                                      value={values[notizKey] || ""}
                                      onChange={e => handleChange(notizKey, e.target.value)}
                                      rows={3}
                                    />
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    }

                    const allFields = getGroupFields(group);
                    const fieldElements = [];
                    let _fi = 0;
                    while (_fi < allFields.length) {
                      const fid = allFields[_fi];
                      const f = FIELDS[fid];
                      if (!f) { _fi++; continue; }
                      const nextFid = allFields[_fi + 1];
                      const nextF = nextFid ? FIELDS[nextFid] : null;
                      if (f.breite === 'Klein' && nextF && nextF.breite === 'Klein') {
                        fieldElements.push(
                          <div key={`pair-${fid}`} id={`field-${fid}`} className="grid grid-cols-2 gap-4" style={!isFieldConditionallyVisible(fid, values) && !isFieldConditionallyVisible(nextFid, values) ? {display:'none'} : {}}>
                            <div>
                              <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>{f.label}</label>
                              <FieldInput fid={fid} value={values[fid]} onChange={handleChange} darkMode={darkMode} sonstigesValue={sonstigesValues[fid]} onSonstigesChange={handleSonstigesChange} />
                            </div>
                            <div>
                              <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>{nextF.label}</label>
                              <FieldInput fid={nextFid} value={values[nextFid]} onChange={handleChange} darkMode={darkMode} sonstigesValue={sonstigesValues[nextFid]} onSonstigesChange={handleSonstigesChange} />
                            </div>
                          </div>
                        );
                        _fi += 2;
                      } else {
                        if (!isFieldConditionallyVisible(fid, values)) { _fi++; continue; }
                        fieldElements.push(
                          <div key={fid} id={`field-${fid}`}>
                            <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>{f.label}</label>
                            <FieldInput fid={fid} value={values[fid]} onChange={handleChange} darkMode={darkMode} sonstigesValue={sonstigesValues[fid]} onSonstigesChange={handleSonstigesChange} />
                          </div>
                        );
                        _fi++;
                      }
                    }

                    return (
                      <div key={gi} className="mb-5 rounded-2xl overflow-hidden border-[3px]" style={{ borderColor: borderTeal, backgroundColor: bgSecondary }}>
                        {(group.showHeader !== false && group.label) && (
                        <div className="px-5 py-4" style={{ backgroundColor: borderTeal }}>
                          <span className="font-bold text-lg text-white">{group.label}</span>
                        </div>
                        )}
                        <div className="px-5 py-5 space-y-5" style={{ backgroundColor: bgPrimary }}>
                          {fieldElements}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>

          {/* FAB */}
          <div className="fixed bottom-6 right-6 flex flex-col gap-3">
            <button onClick={() => setShowNotizenModal(true)} className="w-16 h-16 rounded-full flex items-center justify-center shadow-2xl" style={{ backgroundColor: darkMode ? "#3a7d8a" : BRAND.tealMid }}>
              <StickyNote size={28} strokeWidth={2.5} color="#fff" />
            </button>
            <button onClick={handleDirectFoto} className="w-16 h-16 rounded-full flex items-center justify-center shadow-2xl" style={{ backgroundColor: BRAND.orange }}>
              <Camera size={28} strokeWidth={2.5} color="#fff" />
            </button>
          </div>

          <input ref={fileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={e => handleFotoFile(e.target.files[0])} />

          {/* LIGHTBOX */}
          {showLightbox && fotos[lightboxFoto] && (
            <FotoLightbox
              foto={fotos[lightboxFoto]}
              fotoId={lightboxFoto}
              allFotoIds={fotoIds}
              fotos={fotos}
              darkMode={darkMode}
              onClose={() => setShowLightbox(false)}
              onNext={() => handleLightboxNav('next')}
              onPrev={() => handleLightboxNav('prev')}
            />
          )}

          {showFotoModal && currentFoto && (
            <FotoModal 
              foto={currentFoto} 
              darkMode={darkMode}
              onSave={handleSaveFoto}
              onCancel={() => { setShowFotoModal(false); setCurrentFoto(null); }}
            />
          )}

          {showNotizenModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setShowNotizenModal(false)}>
              <div className="rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto" style={{ backgroundColor: bgSecondary }} onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-xl font-bold" style={{ color: textPrimary }}>Notizen</h2>
                  <button onClick={() => setShowNotizenModal(false)} className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ backgroundColor: darkMode ? "#404040" : "#e8f0f2" }}>
                    <X size={20} strokeWidth={2.5} style={{ color: borderTeal }} />
                  </button>
                </div>
                
                <div className="space-y-4">

                    <textarea
                      className="w-full border-[3px] rounded-xl px-4 py-3 text-base resize-none focus:outline-none"
                      style={{ borderColor: borderTeal, color: textPrimary, backgroundColor: darkMode ? "#1a1a1a" : bgSecondary }}
                      placeholder="Notizen hier eingeben..."
                      value={notizen}
                      onChange={e => setNotizen(e.target.value)}
                      rows={8}
                    />
                  </div>

                  <AudioRecorder darkMode={darkMode} onSave={handleSaveAudio} />

                  {audioNotizen.length > 0 && (
                    <div>
                      <label className="block text-sm font-bold mb-2 uppercase tracking-wide" style={{ color: textSecondary }}>Gespeicherte Audio-Notizen ({audioNotizen.length})</label>
                      <div className="space-y-2">
                        {audioNotizen.map((audio, i) => (
                          <div key={i} className="flex items-center gap-2 p-3 rounded-xl border-[3px]" style={{ borderColor: borderTeal, backgroundColor: darkMode ? "#1a1a1a" : bgSecondary }}>
                            <audio controls src={audio.url} className="flex-1" />
                            <button onClick={() => handleDeleteAudio(i)} className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ backgroundColor: "#dc2626" }}>
                              <Trash2 size={18} strokeWidth={2.5} color="#fff" />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <button onClick={() => setShowNotizenModal(false)} className="w-full mt-6 px-6 py-3 rounded-xl font-bold" style={{ backgroundColor: borderTeal, color: "#fff" }}>
                  Fertig
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BesichtigungsAppVollstaendig />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function(reg){ console.log('[SW] Registriert:', reg.scope); })
          .catch(function(err){ console.warn('[SW] Fehler:', err); });
      });
    }
  </script>
</body>
</html>
